name: Deploy visual MVP to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_SHOWCASE: "true"
      NEXT_PUBLIC_BASE_PATH: /mb-systems
      NEXT_PUBLIC_DEMO_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Render static showcase
        shell: bash
        run: |
          npm start > /tmp/mb-systems-pages.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3000/mb-systems/ > /dev/null; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              cat /tmp/mb-systems-pages.log
              exit 1
            fi
            sleep 1
          done

          mkdir -p pages-dist/_next pages-dist/reservas
          curl --fail --silent --show-error http://127.0.0.1:3000/mb-systems/ > pages-dist/index.html
          curl --fail --silent --show-error http://127.0.0.1:3000/mb-systems/reservas > pages-dist/reservas/index.html
          cp -R .next/static pages-dist/_next/static
          cp -R public/. pages-dist/
          cp pages-dist/index.html pages-dist/404.html
          touch pages-dist/.nojekyll

      - name: Publish gh-pages branch
        shell: bash
        run: |
          git fetch origin gh-pages
          git worktree add --detach /tmp/mb-systems-pages origin/gh-pages
          find /tmp/mb-systems-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a pages-dist/. /tmp/mb-systems-pages/

          git -C /tmp/mb-systems-pages config user.name "github-actions[bot]"
          git -C /tmp/mb-systems-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/mb-systems-pages add -A

          if git -C /tmp/mb-systems-pages diff --cached --quiet; then
            echo "No showcase changes to publish."
            exit 0
          fi

          git -C /tmp/mb-systems-pages commit -m "deploy: update visual MVP"
          git -C /tmp/mb-systems-pages push origin HEAD:gh-pages
